<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ЛР1 – Система пропусків</title>

  <link rel="stylesheet" href="styles.css" />
  <script src="app.js" defer></script>
</head>
<body>

<h1>Система пропусків у комп'ютерний клас</h1>

<div class="container">

  <!-- Форма -->
  <section class="form-section">
    <h2 id="formTitle">Додати пропуск</h2>

    <form id="passForm">

      <div class="field">
        <label for="userName">Ім’я студента</label>
        <input type="text" id="userName" required />
        <small class="error"></small>
      </div>

      <div class="field">
        <label for="reason">Причина</label>
        <select id="reason" required>
          <option value="">-- Оберіть --</option>
          <option>Навчання</option>
          <option>Лабораторна</option>
          <option>Проєкт</option>
          <option>Інше</option>
        </select>
        <small class="error"></small>
      </div>

      <div class="field">
        <label for="validDate">Дата дії</label>
        <input type="date" id="validDate" required />
        <small class="error"></small>
      </div>

      <div class="field">
        <label for="comment">Коментар</label>
        <textarea id="comment"></textarea>
      </div>

      <div class="field">
        <label for="issuer">Видав</label>
        <input type="text" id="issuer" required />
        <small class="error"></small>
      </div>

      <button type="submit">Зберегти</button>
      <button type="button" id="cancelEdit" style="display:none;">Скасувати</button>

    </form>
  </section>

  <section class="table-section">
    <h2>Список пропусків</h2>

    <div class="controls">
      <input type="text" id="searchInput" placeholder="Пошук по імені..." />
      <select id="filterReason">
        <option value="">Усі причини</option>
        <option>Навчання</option>
        <option>Лабораторна</option>
        <option>Проєкт</option>
        <option>Інше</option>
      </select>
      <button id="sortDate">Сортувати за датою</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Студент</th>
          <th>Причина</th>
          <th>Дата</th>
          <th>Видав</th>
          <th>Дії</th>
        </tr>
      </thead>
      <tbody id="passesTableBody"></tbody>
    </table>
  </section>

</div>

</body>
</html>
